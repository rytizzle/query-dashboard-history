bundle:
  name: lakeview-dashboard-history-dlt

variables:
  catalog:
    default: main
  schema:
    default: lakeview_dashboard_history
  audit_window_days:
    default: "30"
  source_page_size:
    default: "1000"
  source_host:
    default: ""
  source_token:
    default: ""
  source_profile:
    default: ""
  source_auth_type:
    default: ""
  source_mint_ephemeral_token:
    default: "true"
  source_ephemeral_token_lifetime_seconds:
    default: "3600"
  source_dashboard_limit:
    default: "0"
  source_parallelism:
    default: "32"
  source_per_partition_threads:
    default: "2"
  source_output_batch_size:
    default: "128"
  source_progress_log_interval:
    default: "1000"
  source_include_serialized_dashboard:
    default: "true"
  source_use_driver_auth:
    default: "true"

targets:
  dev:
    mode: development
    default: true
    resources:
      pipelines:
        lakeview_dashboard_history:
          development: true

  prod:
    mode: production

resources:
  pipelines:
    lakeview_dashboard_history:
      name: "lakeview_dashboard_history_${bundle.target}"
      catalog: ${var.catalog}
      target: ${var.schema}
      development: false
      continuous: false
      channel: CURRENT
      serverless: true
      libraries:
        - file:
            path: ./lakeview_dashboard_history_pipeline.py
        - file:
            path: ./dashboard_snapshot_source.py
      environment:
        dependencies:
          - "databricks-sdk==0.102.0"
          - "pyarrow>=15.0.0"
      configuration:
        "lakeview.audit_window_days": ${var.audit_window_days}
        "lakeview.source.host": ${var.source_host}
        "lakeview.source.token": ${var.source_token}
        "lakeview.source.profile": ${var.source_profile}
        "lakeview.source.auth_type": ${var.source_auth_type}
        "lakeview.source.mint_ephemeral_token": ${var.source_mint_ephemeral_token}
        "lakeview.source.ephemeral_token_lifetime_seconds": ${var.source_ephemeral_token_lifetime_seconds}
        "lakeview.source.page_size": ${var.source_page_size}
        "lakeview.source.dashboard_limit": ${var.source_dashboard_limit}
        "lakeview.source.parallelism": ${var.source_parallelism}
        "lakeview.source.per_partition_threads": ${var.source_per_partition_threads}
        "lakeview.source.output_batch_size": ${var.source_output_batch_size}
        "lakeview.source.progress_log_interval": ${var.source_progress_log_interval}
        "lakeview.source.include_serialized_dashboard": ${var.source_include_serialized_dashboard}
        "lakeview.source.use_driver_auth": ${var.source_use_driver_auth}
