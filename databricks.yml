bundle:
  name: workspace-inventory

variables:
  catalog:
    default: ryant_catalog
  schema:
    default: system_tables
  metric_view_schema:
    default: default
    description: "Schema where the query_history_mv metric view is deployed (used by render_genie_space.py)."
  source_dashboard_limit:
    default: "0"
  source_genie_limit:
    default: "0"
  source_warehouse_limit:
    default: "0"

targets:
  dev:
    mode: development
    default: true
    variables:
      schema: system_tables_dev
      source_dashboard_limit: "200"
      source_genie_limit: "200"
      source_warehouse_limit: "200"
    resources:
      pipelines:
        workspace_inventory:
          development: true

  prod:
    mode: production
    variables:
      schema: system_tables
      source_dashboard_limit: "0"
      source_genie_limit: "0"
      source_warehouse_limit: "0"

resources:
  pipelines:
    workspace_inventory:
      name: "workspace_inventory_${bundle.target}"
      catalog: ${var.catalog}
      target: ${var.schema}
      development: false
      continuous: false
      channel: CURRENT
      serverless: true
      libraries:
        - file:
            path: ./workspace_inventory_pipeline.py
        - file:
            path: ./dashboard_snapshot_source.py
        - file:
            path: ./genie_space_snapshot_source.py
        - file:
            path: ./warehouse_snapshot_source.py
      environment:
        dependencies:
          - "databricks-sdk>=0.102.0"
          - "pyarrow>=15.0.0"
      configuration:
        "source.host": ""
        "source.token": ""
        "source.profile": ""
        "source.auth_type": ""
        "source.mint_ephemeral_token": "true"
        "source.ephemeral_token_lifetime_seconds": "3600"
        "source.use_driver_auth": "true"
        "dashboard.source.page_size": "1000"
        "dashboard.source.dashboard_limit": ${var.source_dashboard_limit}
        "dashboard.source.parallelism": "32"
        "dashboard.source.per_partition_threads": "2"
        "dashboard.source.output_batch_size": "128"
        "dashboard.source.include_serialized_dashboard": "true"
        "dashboard.audit_window_days": "30"
        "genie.source.space_limit": ${var.source_genie_limit}
        "genie.source.parallelism": "4"
        "genie.source.output_batch_size": "64"
        "warehouse.source.warehouse_limit": ${var.source_warehouse_limit}
        "warehouse.source.output_batch_size": "64"
        # Query-level cost attribution
        "cost.window_days": "30"
        "cost.discount_pct": "0"
